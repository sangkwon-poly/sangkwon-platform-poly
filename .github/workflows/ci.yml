name: CI

on:
  pull_request:
  push:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 컴파일 게이트: main/test가 모두 컴파일되어야 한다 (LlmReportControllerTest류 시그니처 깨짐을 여기서 잡는다)
      - name: Compile (main + test)
        run: ./gradlew compileJava compileTestJava --no-daemon

      # 전 계층 단위/웹슬라이스 테스트를 실행한다(결제·관리자 인증·OTP·레이트리밋 포함).
      # Oracle ADB 지갑이 필요한 통합 테스트(@Tag("integration"))만 -PexcludeIntegration 으로 제외한다.
      - name: Unit & web-layer tests
        run: ./gradlew test -PexcludeIntegration --no-daemon
