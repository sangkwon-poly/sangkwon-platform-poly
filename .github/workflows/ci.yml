name: CI

on:
  pull_request:
  push:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 컴파일 게이트: main/test가 모두 컴파일되어야 한다 (LlmReportControllerTest류 시그니처 깨짐을 여기서 잡는다)
      - name: Compile (main + test)
        run: ./gradlew compileJava compileTestJava --no-daemon

      # DB 없이 도는 단위/웹 계층 테스트만 실행.
      # 루트 @SpringBootTest(SangkwonPlatformApplicationTests)는 Oracle ADB 지갑이 필요해 CI에서 제외한다.
      - name: Unit & web-layer tests
        run: >
          ./gradlew test
          --tests "com.sangkwon.sangkwonplatform.map.*"
          --tests "com.sangkwon.sangkwonplatform.global.batch.*"
          --no-daemon
