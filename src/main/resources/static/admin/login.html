<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>관리자 로그인 · 서울공화국</title>
    <link rel="stylesheet" href="/admin/css/login.css"/>
</head>
<body>
<div class="bg-glow" aria-hidden="true"></div>

<header class="topbar">
    <div class="brand">
        <div class="brand-mark">서</div>
        <div class="brand-text">
            <strong>서울공화국</strong>
            <span class="mono">ADMIN CONSOLE</span>
        </div>
    </div>
    <div class="topbar-right">
        <span class="pill">
            <svg viewBox="0 0 24 24" class="ic" aria-hidden="true"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5Zm3 8H9V7a3 3 0 0 1 6 0v3Z"/></svg>
            보안 전용 접속
        </span>
        <span class="mono ver">v2.4.0</span>
    </div>
</header>

<main class="wrap">
    <section class="card" aria-label="관리자 로그인">
        <div class="card-head">
            <div class="head-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3Zm-1 14-4-4 1.4-1.4L11 13.2l4.6-4.6L17 10l-6 6Z"/></svg>
            </div>
            <div>
                <h1>관리자 로그인</h1>
                <p class="mono head-sub">SEOUL TRDAR · CONSOLE</p>
            </div>
        </div>

        <button type="button" class="btn btn-sso" id="sso-btn">
            <svg viewBox="0 0 24 24" class="ic" aria-hidden="true"><path d="M3 21V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4h4a2 2 0 0 1 2 2v10h-5v-4h-2v4H3Zm4-6h2v-2H7v2Zm0-4h2V9H7v2Zm0-4h2V5H7v2Zm4 8h2v-2h-2v2Zm0-4h2V9h-2v2Zm0-4h2V5h-2v2Z"/></svg>
            조직 계정으로 로그인 (SSO)
    </button>

        <div class="divider"><span>또는 사번 로그인</span></div>

        <form id="login-form" novalidate>
            <label class="field-label" for="loginId">사번 · 직원 이메일</label>
            <div class="field">
                <svg viewBox="0 0 24 24" class="field-ic" aria-hidden="true"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 4v10h16V8l-8 5-8-5Zm1.6-2L12 10l6.4-4H5.6Z"/></svg>
                <input id="loginId" name="loginId" type="text" autocomplete="username"
                       placeholder="sanghyuk@seoul.kr" spellcheck="false"/>
            </div>

            <label class="field-label" for="password">비밀번호</label>
            <div class="field">
                <input id="password" name="password" type="password" autocomplete="current-password"
                       placeholder="비밀번호를 입력하세요"/>
                <button type="button" class="field-action" id="pw-toggle" aria-label="비밀번호 표시">표시</button>
            </div>

            <div class="otp-head">
                <label class="field-label" for="otp-0">OTP 인증코드</label>
                <span class="tag">2FA</span>
            </div>
            <div class="otp" id="otp" role="group" aria-label="OTP 6자리">
                <input id="otp-0" class="otp-box" inputmode="numeric" maxlength="1" aria-label="1번째 자리"/>
                <input id="otp-1" class="otp-box" inputmode="numeric" maxlength="1" aria-label="2번째 자리"/>
                <input id="otp-2" class="otp-box" inputmode="numeric" maxlength="1" aria-label="3번째 자리"/>
                <input id="otp-3" class="otp-box" inputmode="numeric" maxlength="1" aria-label="4번째 자리"/>
                <input id="otp-4" class="otp-box" inputmode="numeric" maxlength="1" aria-label="5번째 자리"/>
                <input id="otp-5" class="otp-box" inputmode="numeric" maxlength="1" aria-label="6번째 자리"/>
            </div>

            <div class="row-between">
                <label class="check">
                    <input type="checkbox" id="trust" checked/>
                    <span class="box"></span>
                    이 기기 신뢰 (30일)
                </label>
                <button type="button" class="link" id="reset-btn">비밀번호 재설정</button>
            </div>

            <p class="msg" id="msg" role="status" hidden></p>

            <button type="submit" class="btn btn-login" id="login-btn">관리자 로그인</button>
        </form>

        <div class="notice">
            <svg viewBox="0 0 24 24" class="ic" aria-hidden="true"><path d="M12 2 1 21h22L12 2Zm0 5 7.5 13h-15L12 7Zm-1 4v4h2v-4h-2Zm0 6v2h2v-2h-2Z"/></svg>
            <span>허용된 <strong>IP 대역</strong>에서만 접속할 수 있습니다. 모든 로그인 시도는 감사 로그에 기록됩니다.</span>
        </div>
    </section>
</main>

<footer class="foot">
    <svg viewBox="0 0 24 24" class="ic" aria-hidden="true"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5Zm3 8H9V7a3 3 0 0 1 6 0v3Z"/></svg>
    인가된 사용자 전용 시스템입니다 · 모든 접속과 조작은 기록·감사됩니다
</footer>

<script src="/admin/js/login.js"></script>
</body>
</html>
