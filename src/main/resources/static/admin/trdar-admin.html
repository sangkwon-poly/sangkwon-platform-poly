<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상권 데이터 관리 · 서울공화국</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin/shell.css">
  <link rel="stylesheet" href="/css/admin/trdar-admin.css">
</head>
<body>

  <div class="admin">

    <!-- 좌측 사이드바 -->
    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin/">
        <span class="brand-mark" aria-hidden="true">서</span>
        <span class="admin-brand-text">
          <span class="admin-brand-name">서울공화국</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin/">개요</a>
        <a href="/admin/batch.html">데이터 적재</a>
        <a href="/admin/trdar-admin.html" aria-current="page">상권 데이터</a>
        <a href="/admin/user-admin.html">관리자 계정</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map/">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">이</span>
        <span>
          <span class="admin-user-name">이상혁</span>
          <span class="admin-user-role">PM</span>
        </span>
      </div>
    </aside>

    <!-- 본문 -->
    <div class="admin-main">
      <header class="admin-topbar">
        <h1>상권 데이터 관리</h1>
        <span class="admin-topbar-meta">GeoJSON · EPSG:5181 → WGS84</span>
      </header>

      <div class="trd-body">

        <!-- 좌: 자치구 목록 표 -->
        <main class="trd-list" aria-label="자치구별 상권 데이터">
          <div class="data-table-wrap">
            <div class="table-scroll">
              <table class="data-table trd-table">
                <thead>
                  <tr>
                    <th scope="col">행정코드</th>
                    <th scope="col">자치구</th>
                    <th scope="col" class="col-num">상권 수</th>
                    <th scope="col" class="col-center">검수 상태</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td class="mono trd-code">11680</td>
                    <td>
                      <span class="trd-gu">
                        <span class="trd-swatch" style="background:#822c1d" aria-hidden="true"></span>
                        <span class="trd-gu-name">강남구</span>
                      </span>
                    </td>
                    <td class="col-num">98</td>
                    <td class="col-center"><span class="trd-state trd-done">검수완료</span></td>
                  </tr>
                  <tr>
                    <td class="mono trd-code">11650</td>
                    <td>
                      <span class="trd-gu">
                        <span class="trd-swatch" style="background:#a03c29" aria-hidden="true"></span>
                        <span class="trd-gu-name">서초구</span>
                      </span>
                    </td>
                    <td class="col-num">84</td>
                    <td class="col-center"><span class="trd-state trd-done">검수완료</span></td>
                  </tr>
                  <tr>
                    <td class="mono trd-code">11440</td>
                    <td>
                      <span class="trd-gu">
                        <span class="trd-swatch" style="background:#ad4833" aria-hidden="true"></span>
                        <span class="trd-gu-name">마포구</span>
                      </span>
                    </td>
                    <td class="col-num">76</td>
                    <td class="col-center"><span class="trd-state trd-review">검토중</span></td>
                  </tr>
                  <tr>
                    <td class="mono trd-code">11200</td>
                    <td>
                      <span class="trd-gu">
                        <span class="trd-swatch" style="background:#bf644c" aria-hidden="true"></span>
                        <span class="trd-gu-name">성동구</span>
                      </span>
                    </td>
                    <td class="col-num">61</td>
                    <td class="col-center"><span class="trd-state trd-review">검토중</span></td>
                  </tr>
                  <tr>
                    <td class="mono trd-code">11110</td>
                    <td>
                      <span class="trd-gu">
                        <span class="trd-swatch" style="background:#c36b53" aria-hidden="true"></span>
                        <span class="trd-gu-name">종로구</span>
                      </span>
                    </td>
                    <td class="col-num">58</td>
                    <td class="col-center"><span class="trd-state trd-fix">수정필요</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>

        <!-- 우: 상세 (폴리곤 미리보기 · 매핑 정보) -->
        <aside class="trd-detail" aria-label="선택 자치구 상세">
          <section class="trd-preview">
            <h2 class="trd-detail-title">폴리곤 미리보기 · 강남구</h2>
            <div class="trd-preview-box">
              <div class="trd-grid" aria-hidden="true">
                <span style="background:#e0a58f"></span><span style="background:#c36b53"></span><span style="background:#842d1e"></span><span style="background:#ebc6b6"></span>
                <span style="background:#b95b44"></span><span style="background:#e9bead"></span><span style="background:#dd9d86"></span><span style="background:#ebc6b6"></span>
                <span style="background:#842d1e"></span><span style="background:#b85942"></span><span style="background:#f2dbd1"></span><span style="background:#b95b44"></span>
                <span style="background:#e7b9a7"></span><span style="background:#e9c1b0"></span><span style="background:#f2dbd1"></span><span style="background:#c8755d"></span>
                <span style="background:#89301f"></span><span style="background:#973825"></span><span style="background:#a23e29"></span><span style="background:#e9c1b0"></span>
                <span style="background:#ebc6b6"></span><span style="background:#af4c36"></span><span style="background:#842d1e"></span><span style="background:#ac4731"></span>
                <span style="background:#ae4a35"></span><span style="background:#f4e4dc"></span><span style="background:#993926"></span><span style="background:#f3dfd5"></span>
                <span style="background:#aa452f"></span><span style="background:#e0a58f"></span><span style="background:#e2ac98"></span><span style="background:#be624b"></span>
                <span style="background:#f6ebe5"></span><span style="background:#f6eae3"></span><span style="background:#b04e38"></span><span style="background:#8d3221"></span>
                <span style="background:#efd2c5"></span><span style="background:#d48c74"></span><span style="background:#8b3120"></span><span style="background:#b3523b"></span>
              </div>
            </div>
          </section>

          <section class="trd-mapping">
            <h2 class="trd-detail-title">매핑 정보</h2>
            <dl class="trd-info">
              <div class="trd-info-row">
                <dt>행정코드</dt>
                <dd class="mono">11680</dd>
              </div>
              <div class="trd-info-row">
                <dt>상권 수</dt>
                <dd>98개</dd>
              </div>
              <div class="trd-info-row">
                <dt>좌표계</dt>
                <dd class="mono">EPSG:5181</dd>
              </div>
              <div class="trd-info-row trd-info-last">
                <dt>최종 검수</dt>
                <dd class="trd-done-text">완료 · 07-02</dd>
              </div>
            </dl>
          </section>

          <div class="trd-actions">
            <button type="button" class="btn btn-primary trd-btn-edit">매핑 편집</button>
            <button type="button" class="btn btn-ghost trd-btn-recheck">재검수</button>
          </div>
        </aside>

      </div>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
</body>
</html>
