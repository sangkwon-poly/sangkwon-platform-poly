<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상권 데이터 · 서울공화국</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin/shell.css">
  <link rel="stylesheet" href="/css/admin/trdar-admin.css">
</head>
<body>

  <div class="admin">

    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin">
        <span class="brand-mark" aria-hidden="true">서</span>
        <span class="admin-brand-text">
          <span class="admin-brand-name">서울공화국</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin">개요</a>
        <a href="/admin/batch">데이터 적재</a>
        <a href="/admin/trdar-admin" aria-current="page">상권 데이터</a>
        <a href="/admin/user-admin">관리자 계정</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">·</span>
        <span>
          <span class="admin-user-name">—</span>
          <span class="admin-user-role">—</span>
        </span>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1>상권 데이터</h1>
        <span class="admin-topbar-meta" id="trd-meta">서울시 상권</span>
      </header>

      <main class="admin-content" aria-label="상권 데이터">

        <div class="trd-controls">
          <label class="trd-ctrl">
            <span>분기</span>
            <select id="trd-quarter"></select>
          </label>
          <label class="trd-ctrl">
            <span>자치구</span>
            <select id="trd-gu"><option value="">전체</option></select>
          </label>
          <div class="trd-search" role="search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
            </svg>
            <input type="search" id="trd-keyword" placeholder="상권명·자치구 검색" autocomplete="off">
          </div>
          <span class="trd-count" id="trd-count"></span>
        </div>

        <section class="trd-health" aria-label="데이터 품질 점검">
          <div class="trd-health-head">
            <h2>데이터 품질 점검</h2>
            <span class="trd-health-q" id="trd-health-q">—</span>
          </div>
          <div class="trd-health-facts" id="trd-health-facts"><span class="trd-muted">불러오는 중…</span></div>
          <div class="trd-health-flags" id="trd-health-flags"></div>
        </section>

        <section class="stat-grid trd-stats" aria-label="상권 요약">
          <article class="stat-card"><div class="stat-card-label">상권 수</div><div class="stat-card-value" id="trd-stat-count">—</div></article>
          <article class="stat-card"><div class="stat-card-label">총 추정매출</div><div class="stat-card-value" id="trd-stat-sales">—</div></article>
          <article class="stat-card"><div class="stat-card-label">총 점포 수</div><div class="stat-card-value" id="trd-stat-store">—</div></article>
        </section>

        <section class="data-table-wrap" aria-label="상권 목록 표">
          <div class="table-scroll">
            <table class="data-table trd-table">
              <thead>
                <tr>
                  <th scope="col">상권명</th>
                  <th scope="col">자치구</th>
                  <th scope="col" class="col-center">상권 변화</th>
                  <th scope="col" class="col-num trd-sort" data-sort="salesAmt" aria-sort="descending">추정매출<span class="trd-arrow">▾</span></th>
                  <th scope="col" class="col-num trd-sort" data-sort="flpop">유동인구<span class="trd-arrow">▾</span></th>
                  <th scope="col" class="col-num trd-sort" data-sort="storeCnt">점포 수<span class="trd-arrow">▾</span></th>
                </tr>
              </thead>
              <tbody id="trd-tbody">
                <tr><td colspan="6" class="trd-empty">불러오는 중…</td></tr>
              </tbody>
            </table>
          </div>
        </section>
        <nav class="trd-pager" id="trd-pager" aria-label="페이지" hidden></nav>
      </main>
    </div>
  </div>

  <!-- 상권 상세 모달 -->
  <div class="trd-modal" id="trd-modal" hidden>
    <div class="trd-modal-backdrop" data-close></div>
    <div class="trd-modal-card" role="dialog" aria-modal="true" aria-labelledby="trd-modal-title">
      <header class="trd-modal-head">
        <div>
          <h2 id="trd-modal-title">—</h2>
          <p class="trd-modal-sub" id="trd-modal-sub">—</p>
        </div>
        <button type="button" class="trd-modal-x" data-close aria-label="닫기">×</button>
      </header>
      <div class="trd-modal-body">
        <section class="trd-region trd-region-top">
          <div class="trd-metrics" id="trd-metrics"></div>
          <h3 class="trd-sec-title">업종별 매출 상위</h3>
          <div class="trd-induty" id="trd-induty"></div>
        </section>
        <section class="trd-region trd-region-chart">
          <h3 class="trd-sec-title">분기 추이 · 추정매출</h3>
          <div class="trd-trend" id="trd-trend"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/trdar-admin.js"></script>
</body>
</html>
