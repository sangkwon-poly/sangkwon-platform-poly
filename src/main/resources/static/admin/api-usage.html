<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API 사용량 · 여기콕</title>
  <link rel="stylesheet" href="/common/css/common.css">
  <link rel="stylesheet" href="/admin/css/shell.css?v=20260712b">
  <link rel="stylesheet" href="/admin/css/ops.css?v=20260712c">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>

  <div class="admin">

    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="admin-brand-text">
          <span class="brand-name-kok">콕</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin">개요</a>
        <span class="admin-nav-label">데이터</span>
        <a href="/admin/batch">데이터 적재</a>
        <a href="/admin/trdar-admin">상권 데이터</a>
        <a href="/admin/support-admin">지원사업</a>
        <span class="admin-nav-label">서비스 운영</span>
        <a href="/admin/member-admin">회원 관리</a>
        <a href="/admin/payment-admin">결제·구독</a>
        <a href="/admin/notice-admin">공지사항</a>
        <a href="/admin/inquiry-admin">1:1 문의</a>
        <span class="admin-nav-label">시스템</span>
        <a href="/admin/user-admin">관리자 계정</a>
        <a href="/admin/audit-log">감사 로그</a>
        <a href="/admin/api-usage" aria-current="page">API 사용</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">·</span>
        <span>
          <span class="admin-user-name">—</span>
          <span class="admin-user-role">—</span>
        </span>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1>API 사용량</h1>
        <span class="admin-topbar-meta">외부 API 일자별 호출량 · 오늘</span>
      </header>

      <main class="admin-content" aria-label="외부 API 사용량">

        <!-- 오늘 요약 -->
        <section class="usage-summary" aria-label="오늘 사용량 요약">
          <article class="stat-card">
            <div class="stat-card-label">오늘 총 호출</div>
            <div class="stat-card-value" id="us-total">—</div>
            <div class="usage-sub">외부 API 합계</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">계측 API</div>
            <div class="stat-card-value" id="us-count">—</div>
            <div class="usage-sub">사용량 추적 대상</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">한도 근접</div>
            <div class="stat-card-value" id="us-near">—</div>
            <div class="usage-sub" id="us-near-sub">70% 이상</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">최다 사용</div>
            <div class="stat-card-value" id="us-top">—</div>
            <div class="usage-sub" id="us-top-sub">가장 높은 사용률</div>
          </article>
        </section>

        <!-- 일자별 호출 추이 -->
        <section class="card usage-trend" aria-label="일자별 호출 추이">
          <div class="card-head">
            <h2 class="card-title">일자별 호출 추이</h2>
            <span class="card-link">최근 14일 · 총 호출</span>
          </div>
          <div id="us-trend"><p class="ops-empty">불러오는 중…</p></div>
        </section>

        <!-- API별 오늘 사용량 -->
        <section aria-label="API별 오늘 사용량">
          <div class="card-head usage-section-head">
            <h2 class="card-title">API별 오늘 사용량</h2>
            <span class="card-link">일일 한도 대비</span>
          </div>
          <div class="usage-grid" id="usage-grid">
            <p class="ops-empty">불러오는 중…</p>
          </div>
        </section>

      </main>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/api-usage.js?v=20260712c"></script>
</body>
</html>
