<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 계정 · 여기콕</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin/shell.css">
  <link rel="stylesheet" href="/css/admin/user-admin.css">
</head>
<body>

  <div class="admin">

    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="admin-brand-text">
          <span class="brand-name-kok">콕</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin">개요</a>
        <a href="/admin/batch">데이터 적재</a>
        <a href="/admin/trdar-admin">상권 데이터</a>
        <a href="/admin/user-admin" aria-current="page">관리자 계정</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">·</span>
        <span>
          <span class="admin-user-name">—</span>
          <span class="admin-user-role">—</span>
        </span>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1>관리자 계정</h1>
        <span class="admin-topbar-meta">콘솔 접근 권한을 가진 관리자 계정</span>
        <button type="button" class="btn-topbar" id="ua-add">＋ 관리자 추가</button>
      </header>

      <main class="admin-content" aria-label="관리자 계정 목록">

        <div class="ua-filters" id="ua-filters" aria-label="상태 필터">
          <button type="button" class="ua-chip ua-chip-active" data-filter="ALL">전체 <b>0</b></button>
          <button type="button" class="ua-chip" data-filter="ACTIVE">활성 <b>0</b></button>
          <button type="button" class="ua-chip" data-filter="LOCKED">잠김 <b>0</b></button>
        </div>

        <section class="data-table-wrap" aria-label="관리자 계정 표">
          <div class="table-scroll">
            <table class="data-table ua-table">
              <thead>
                <tr>
                  <th scope="col">관리자</th>
                  <th scope="col">권한</th>
                  <th scope="col" class="col-center">상태</th>
                  <th scope="col" class="col-center">로그인 실패</th>
                  <th scope="col">최근 로그인</th>
                  <th scope="col">생성일</th>
                  <th scope="col" class="col-center">작업</th>
                </tr>
              </thead>
              <tbody id="ua-tbody">
                <tr><td colspan="7" class="ua-empty">불러오는 중…</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- 관리자 추가 모달 -->
  <div class="ua-modal" id="ua-modal" hidden>
    <div class="ua-modal-backdrop" data-close></div>
    <div class="ua-modal-card" role="dialog" aria-modal="true" aria-labelledby="ua-modal-title">
      <h2 id="ua-modal-title">관리자 추가</h2>
      <form id="ua-form" class="ua-form" autocomplete="off">
        <label class="ua-field">
          <span>로그인 ID</span>
          <input type="text" name="loginId" maxlength="50" required placeholder="예: operator01">
        </label>
        <label class="ua-field">
          <span>이름</span>
          <input type="text" name="adminName" maxlength="50" required placeholder="예: 홍길동">
        </label>
        <label class="ua-field">
          <span>권한</span>
          <select name="role">
            <option value="VIEWER">뷰어</option>
            <option value="OPERATOR">운영자</option>
            <option value="SUPER_ADMIN">최고관리자</option>
          </select>
        </label>
        <label class="ua-field">
          <span>초기 비밀번호</span>
          <input type="password" name="password" required placeholder="8자 이상 권장">
        </label>
        <p class="ua-form-msg" id="ua-form-msg" hidden></p>
        <div class="ua-form-actions">
          <button type="button" class="ua-btn ua-btn-ghost" data-close>취소</button>
          <button type="submit" class="ua-btn ua-btn-primary" id="ua-submit">추가</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 비밀번호 재설정 모달 -->
  <div class="ua-modal" id="ua-reset-modal" hidden>
    <div class="ua-modal-backdrop" data-reset-close></div>
    <div class="ua-modal-card" role="dialog" aria-modal="true" aria-labelledby="ua-reset-title">
      <h2 id="ua-reset-title">비밀번호 재설정</h2>
      <p class="ua-reset-target" id="ua-reset-target"></p>
      <form id="ua-reset-form" class="ua-form" autocomplete="off">
        <label class="ua-field">
          <span>새 비밀번호</span>
          <input type="password" name="newPassword" minlength="4" required placeholder="4자 이상">
        </label>
        <p class="ua-form-msg" id="ua-reset-msg" hidden></p>
        <div class="ua-form-actions">
          <button type="button" class="ua-btn ua-btn-ghost" data-reset-close>취소</button>
          <button type="submit" class="ua-btn ua-btn-primary" id="ua-reset-submit">재설정</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/user-admin.js"></script>
</body>
</html>
