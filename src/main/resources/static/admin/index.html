<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 개요 · 여기콕</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin/shell.css">
  <link rel="stylesheet" href="/css/admin/overview.css">
</head>
<body>

  <div class="admin">

    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="admin-brand-text">
          <span class="brand-name-kok">콕</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin" aria-current="page">개요</a>
        <a href="/admin/batch">데이터 적재</a>
        <a href="/admin/trdar-admin">상권 데이터</a>
        <a href="/admin/user-admin">관리자 계정</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">·</span>
        <span>
          <span class="admin-user-name">—</span>
          <span class="admin-user-role">—</span>
        </span>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1>관리자 개요</h1>
        <span class="admin-topbar-meta" id="ov-meta">여기콕 관리자 콘솔</span>
      </header>

      <main class="admin-content" aria-label="지표 및 상태 요약">

        <section class="stat-grid" aria-label="핵심 지표">
          <article class="stat-card">
            <div class="stat-card-label">회원</div>
            <div class="stat-card-value ov-value" id="ov-stat-member">—</div>
            <div class="stat-delta ov-flat" id="ov-sub-member">가입 회원</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">리포트</div>
            <div class="stat-card-value ov-value" id="ov-stat-report">—</div>
            <div class="stat-delta ov-flat" id="ov-sub-report">AI 생성</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">분석 상권</div>
            <div class="stat-card-value ov-value" id="ov-stat-trdar">—</div>
            <div class="stat-delta ov-flat" id="ov-sub-trdar">서울시 전체</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">관리자</div>
            <div class="stat-card-value ov-value" id="ov-stat-admin">—</div>
            <div class="stat-delta ov-flat" id="ov-sub-admin">계정 수</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">오늘 API 최고 사용</div>
            <div class="stat-card-value ov-value" id="ov-stat-api">—</div>
            <div class="stat-delta ov-flat" id="ov-sub-api">외부 API</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">최근 배치</div>
            <div class="stat-card-value ov-value" id="ov-stat-batch">—</div>
            <div class="stat-delta ov-flat" id="ov-sub-batch">적재 상태</div>
          </article>
        </section>

        <div class="ov-charts">

          <section class="card" aria-label="오늘 외부 API 사용량">
            <div class="card-head">
              <h2 class="card-title">오늘 API 사용량</h2>
              <a class="card-link" href="/admin/api-usage">전체 보기 →</a>
            </div>
            <ul class="bar-list" id="ov-api-bars">
              <li class="ov-note">불러오는 중…</li>
            </ul>
          </section>

          <section class="card" aria-label="최근 배치 결과">
            <div class="card-head">
              <h2 class="card-title">최근 배치 결과</h2>
              <a class="card-link" href="/admin/batch">전체 보기 →</a>
            </div>
            <div class="donut-wrap" id="ov-batch-donut">
              <p class="ov-note">불러오는 중…</p>
            </div>
          </section>

        </div>

        <div class="ov-cols">

          <section class="card" aria-label="데이터 적재 현황">
            <div class="card-head">
              <h2 class="card-title">데이터 적재 현황</h2>
              <a class="card-link" href="/admin/batch">전체 보기 →</a>
            </div>
            <ul class="load-list" id="ov-load">
              <li class="load-item"><span class="load-name">불러오는 중…</span></li>
            </ul>
          </section>

          <section class="card" aria-label="최근 활동">
            <div class="card-head">
              <h2 class="card-title ov-recent-title">최근 활동</h2>
              <a class="card-link" href="/admin/audit-log">감사 로그 →</a>
            </div>
            <ul class="feed" id="ov-feed">
              <li class="feed-item"><div class="feed-text">불러오는 중…</div></li>
            </ul>
          </section>

        </div>
      </main>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/overview.js"></script>
</body>
</html>
