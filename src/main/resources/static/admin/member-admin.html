<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원 관리 · 여기콕</title>
  <link rel="stylesheet" href="/common/css/common.css">
  <link rel="stylesheet" href="/admin/css/shell.css">
  <link rel="stylesheet" href="/admin/css/member-admin.css">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>

  <div class="admin">

    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="admin-brand-text">
          <span class="brand-name-kok">콕</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin">개요</a>
        <span class="admin-nav-label">데이터</span>
        <a href="/admin/batch">데이터 적재</a>
        <a href="/admin/trdar-admin">상권 데이터</a>
        <a href="/admin/support-admin">지원사업</a>
        <span class="admin-nav-label">서비스 운영</span>
        <a href="/admin/member-admin" aria-current="page">회원 관리</a>
        <a href="/admin/payment-admin">결제·구독</a>
        <a href="/admin/notice-admin">공지사항</a>
        <a href="/admin/inquiry-admin">1:1 문의</a>
        <span class="admin-nav-label">시스템</span>
        <a href="/admin/user-admin">관리자 계정</a>
        <a href="/admin/audit-log">감사 로그</a>
        <a href="/admin/api-usage">API 사용</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">·</span>
        <span>
          <span class="admin-user-name">—</span>
          <span class="admin-user-role">—</span>
        </span>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1>회원 관리</h1>
        <span class="admin-topbar-meta" id="ma-meta">회원 계정 조회 및 상태 관리</span>
      </header>

      <main class="admin-content" aria-label="회원 목록">

        <p class="ma-flash" id="ma-flash" role="status" hidden></p>

        <div class="ma-toolbar">
          <div class="ma-chips" id="ma-chips" aria-label="상태 필터"></div>
          <div class="ma-search">
            <input type="search" id="ma-search" placeholder="아이디·이메일·닉네임 검색"
                   autocomplete="off" aria-label="회원 검색">
          </div>
        </div>

        <section class="data-table-wrap" aria-label="회원 표">
          <div class="table-scroll">
            <table class="data-table ma-table">
              <thead>
                <tr>
                  <th scope="col">회원</th>
                  <th scope="col">이메일</th>
                  <th scope="col" class="col-center">상태</th>
                  <th scope="col" class="col-center">구독</th>
                  <th scope="col"><button type="button" class="ma-th-sort" data-sort="createdAt">가입일<span class="ma-arrow" aria-hidden="true"></span></button></th>
                  <th scope="col"><button type="button" class="ma-th-sort" data-sort="lastLoginAt">최근 로그인<span class="ma-arrow" aria-hidden="true"></span></button></th>
                  <th scope="col" class="col-center">관리</th>
                </tr>
              </thead>
              <tbody id="ma-tbody">
                <tr><td colspan="7" class="ma-empty">불러오는 중…</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <div class="ma-pager" id="ma-pager" hidden>
          <button type="button" class="ma-page-btn" id="ma-prev" aria-label="이전 페이지">이전</button>
          <div class="ma-pages" id="ma-pages" aria-label="페이지 번호"></div>
          <button type="button" class="ma-page-btn" id="ma-next" aria-label="다음 페이지">다음</button>
        </div>
      </main>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/member-admin.js"></script>
</body>
</html>
