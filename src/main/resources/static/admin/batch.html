<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>데이터 적재 현황 · 서울공화국</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin/shell.css">
  <link rel="stylesheet" href="/css/admin/batch.css">
</head>
<body>

  <div class="admin">

    <!-- 좌측 사이드바 -->
    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin">
        <span class="brand-mark" aria-hidden="true">서</span>
        <span class="admin-brand-text">
          <span class="admin-brand-name">서울공화국</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin">개요</a>
        <a href="/admin/batch" aria-current="page">데이터 적재</a>
        <a href="/admin/trdar-admin">상권 데이터</a>
        <a href="/admin/user-admin">관리자 계정</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">·</span>
        <span>
          <span class="admin-user-name">—</span>
          <span class="admin-user-role">—</span>
        </span>
      </div>
    </aside>

    <!-- 본문 -->
    <div class="admin-main">
      <header class="admin-topbar">
        <h1>데이터 적재 현황</h1>
        <button type="button" class="btn-topbar" id="batch-refresh">새로고침</button>
      </header>

      <main class="admin-content" aria-label="배치 모니터링">

        <!-- 배치 지표 -->
        <section class="stat-grid batch-stats" aria-label="배치 요약">
          <article class="stat-card">
            <div class="stat-card-label">마지막 배치</div>
            <div class="stat-card-value">—</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">성공</div>
            <div class="stat-card-value bt-ok">—</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">지연</div>
            <div class="stat-card-value bt-warn">—</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">오류</div>
            <div class="stat-card-value bt-danger">—</div>
          </article>
        </section>

        <!-- 적재 테이블 -->
        <section class="data-table-wrap" aria-label="테이블별 적재 결과">
          <div class="table-scroll">
            <table class="data-table batch-table">
              <thead>
                <tr>
                  <th scope="col">테이블</th>
                  <th scope="col">적재 시각</th>
                  <th scope="col" class="col-num">행 수</th>
                  <th scope="col" class="col-num">소요</th>
                  <th scope="col" class="col-center">상태</th>
                  <th scope="col">트리거</th>
                </tr>
              </thead>
              <tbody>
                <tr><td colspan="6" class="ops-empty">불러오는 중…</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
  <script src="/admin/js/batch.js"></script>
</body>
</html>
