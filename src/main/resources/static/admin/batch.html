<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>데이터 적재 현황 · 서울공화국</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin/shell.css">
  <link rel="stylesheet" href="/css/admin/batch.css">
</head>
<body>

  <div class="admin">

    <!-- 좌측 사이드바 -->
    <aside class="admin-side" aria-label="관리자 메뉴">
      <a class="admin-brand" href="/admin/">
        <span class="brand-mark" aria-hidden="true">서</span>
        <span class="admin-brand-text">
          <span class="admin-brand-name">서울공화국</span>
          <span class="admin-brand-sub">관리자 콘솔</span>
        </span>
      </a>
      <nav class="admin-nav" aria-label="관리자 내비게이션">
        <a href="/admin/">개요</a>
        <a href="/admin/batch.html" aria-current="page">데이터 적재</a>
        <a href="/admin/trdar-admin.html">상권 데이터</a>
        <a href="/admin/user-admin.html">사용자 관리</a>
        <hr class="admin-nav-sep">
        <span class="admin-nav-out">
          <a href="/map/">지도로 이동</a>
          <a href="/">랜딩으로</a>
        </span>
      </nav>
      <div class="admin-user">
        <span class="admin-user-avatar" aria-hidden="true">이</span>
        <span>
          <span class="admin-user-name">이상혁</span>
          <span class="admin-user-role">PM</span>
        </span>
      </div>
    </aside>

    <!-- 본문 -->
    <div class="admin-main">
      <header class="admin-topbar">
        <h1>데이터 적재 현황</h1>
        <button type="button" class="btn-topbar">수동 실행</button>
      </header>

      <main class="admin-content" aria-label="배치 모니터링">

        <!-- 배치 지표 -->
        <section class="stat-grid batch-stats" aria-label="배치 요약">
          <article class="stat-card">
            <div class="stat-card-label">마지막 배치</div>
            <div class="stat-card-value">04:30</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">성공</div>
            <div class="stat-card-value bt-ok">4</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">지연</div>
            <div class="stat-card-value bt-warn">1</div>
          </article>
          <article class="stat-card">
            <div class="stat-card-label">오류</div>
            <div class="stat-card-value bt-danger">1</div>
          </article>
        </section>

        <!-- 적재 테이블 -->
        <section class="data-table-wrap" aria-label="테이블별 적재 결과">
          <div class="table-scroll">
            <table class="data-table batch-table">
              <thead>
                <tr>
                  <th scope="col">테이블</th>
                  <th scope="col">적재 시각</th>
                  <th scope="col" class="col-num">행 수</th>
                  <th scope="col" class="col-num">소요</th>
                  <th scope="col" class="col-center">상태</th>
                  <th scope="col" class="col-num">작업</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="mono bt-name">TRDAR_SALES</td>
                  <td class="bt-muted">04:12</td>
                  <td class="col-num mono">1,247,000</td>
                  <td class="col-num bt-muted">3m 20s</td>
                  <td class="col-center">
                    <span class="badge badge-ok"><span class="dot dot-ok" aria-hidden="true"></span>정상</span>
                  </td>
                  <td class="col-num"><button type="button" class="row-action">재실행</button></td>
                </tr>
                <tr>
                  <td class="mono bt-name">STREET_POP</td>
                  <td class="bt-muted">04:15</td>
                  <td class="col-num mono">892,400</td>
                  <td class="col-num bt-muted">2m 05s</td>
                  <td class="col-center">
                    <span class="badge badge-ok"><span class="dot dot-ok" aria-hidden="true"></span>정상</span>
                  </td>
                  <td class="col-num"><button type="button" class="row-action">재실행</button></td>
                </tr>
                <tr>
                  <td class="mono bt-name">STORE_STAT</td>
                  <td class="bt-muted">04:22</td>
                  <td class="col-num mono">340,120</td>
                  <td class="col-num bt-muted">4m 48s</td>
                  <td class="col-center">
                    <span class="badge badge-warn"><span class="dot dot-warn" aria-hidden="true"></span>지연</span>
                  </td>
                  <td class="col-num"><button type="button" class="row-action">재실행</button></td>
                </tr>
                <tr>
                  <td class="mono bt-name">COMMERCIAL_RENT</td>
                  <td class="bt-muted">04:30</td>
                  <td class="col-num mono">51,200</td>
                  <td class="col-num bt-muted">1m 12s</td>
                  <td class="col-center">
                    <span class="badge badge-ok"><span class="dot dot-ok" aria-hidden="true"></span>정상</span>
                  </td>
                  <td class="col-num"><button type="button" class="row-action">재실행</button></td>
                </tr>
                <tr>
                  <td class="mono bt-name">TRDAR_CHANGE</td>
                  <td class="bt-muted">-</td>
                  <td class="col-num mono">-</td>
                  <td class="col-num bt-muted">-</td>
                  <td class="col-center">
                    <span class="badge badge-danger"><span class="dot dot-danger" aria-hidden="true"></span>오류</span>
                  </td>
                  <td class="col-num"><button type="button" class="row-action">재실행</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/admin/js/admin-shell.js"></script>
</body>
</html>
