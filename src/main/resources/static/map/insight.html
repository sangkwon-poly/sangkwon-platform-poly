          <p class="lock-desc">업종 키워드 관련 최신 기사·트렌드를 수집합니다.</p>
          <span class="lock-tag">미신청</span>
        </div>
      </section>

      <!-- 기업 공시 -->
      <section class="feed card">
        <div class="feed-head">
          <div>
            <h2 class="feed-title">기업 공시</h2>
            <p class="feed-source">DART OpenAPI</p>
          </div>
          <span class="feed-icon" aria-hidden="true">▤</span>
        </div>
        <div class="feed-skeleton" aria-hidden="true">
          <div class="sk"><span class="sk-a" style="width:84%"></span><span class="sk-b" style="width:58%"></span><span class="sk-c" style="width:40%"></span></div>

        </div>
      </section>

      <!-- 특허·상표 -->
      <section class="feed card">
        <div class="feed-head">
          <div>
            <h2 class="feed-title">특허·상표</h2>
            <p class="feed-source">KIPRIS API</p>
