<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>업종·상권 동향 · 서울공화국</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/map/shell.css">
  <link rel="stylesheet" href="/css/map/insight.css">
</head>
<body>
<div class="app">

  <!-- 앱 헤더 -->
  <header class="app-header">
    <a class="app-brand" href="/">
      <span class="app-brand-mark" aria-hidden="true">서</span>
      <span class="app-brand-text"><span class="app-brand-name">서울공화국</span></span>
    </a>
    <span class="app-page-name">업종·상권 동향</span>
    <div class="app-tools">
      <span class="app-quarter">API 미신청</span>
      <a class="app-user" href="/login"><span class="app-avatar" aria-hidden="true">이</span></a>
    </div>
  </header>

  <!-- 동향 본문 -->
  <main class="insight" aria-label="업종·상권 동향">

    <div class="insight-titlebar">
      <h1 class="insight-title">카페·디저트 <span class="insight-title-sub">· 강남구</span></h1>
      <span class="insight-note">실 데이터 연동 예정 · 화면은 목업</span>
    </div>

    <div class="insight-grid">

      <!-- 업종 뉴스 -->
      <section class="feed card">
        <div class="feed-head">
          <div>
            <h2 class="feed-title">업종 뉴스</h2>
            <p class="feed-source">네이버 뉴스검색 API</p>
          </div>
          <span class="feed-icon" aria-hidden="true">📰</span>
        </div>
        <div class="feed-skeleton" aria-hidden="true">
          <div class="sk"><span class="sk-a" style="width:88%"></span><span class="sk-b" style="width:62%"></span><span class="sk-c" style="width:40%"></span></div>
          <div class="sk"><span class="sk-a" style="width:80%"></span><span class="sk-b" style="width:55%"></span><span class="sk-c" style="width:40%"></span></div>
          <div class="sk"><span class="sk-a" style="width:92%"></span><span class="sk-b" style="width:48%"></span><span class="sk-c" style="width:40%"></span></div>
        </div>
        <div class="feed-lock">
          <span class="lock-icon" aria-hidden="true">🔒</span>
          <p class="lock-title">데이터 연동 예정</p>
          <p class="lock-desc">업종 키워드 관련 최신 기사·트렌드를 수집합니다.</p>
          <span class="lock-tag">미신청</span>
        </div>
      </section>

      <!-- 기업 공시 -->
      <section class="feed card">
        <div class="feed-head">
          <div>
            <h2 class="feed-title">기업 공시</h2>
            <p class="feed-source">DART OpenAPI</p>
          </div>
          <span class="feed-icon" aria-hidden="true">▤</span>
        </div>
        <div class="feed-skeleton" aria-hidden="true">
          <div class="sk"><span class="sk-a" style="width:84%"></span><span class="sk-b" style="width:58%"></span><span class="sk-c" style="width:40%"></span></div>
          <div class="sk"><span class="sk-a" style="width:90%"></span><span class="sk-b" style="width:52%"></span><span class="sk-c" style="width:40%"></span></div>
          <div class="sk"><span class="sk-a" style="width:76%"></span><span class="sk-b" style="width:60%"></span><span class="sk-c" style="width:40%"></span></div>
        </div>
        <div class="feed-lock">
          <span class="lock-icon" aria-hidden="true">🔒</span>
          <p class="lock-title">데이터 연동 예정</p>
          <p class="lock-desc">프랜차이즈 본사·경쟁사의 공시와 실적을 연동합니다.</p>
          <span class="lock-tag">미신청</span>
        </div>
      </section>

      <!-- 특허·상표 -->
      <section class="feed card">
        <div class="feed-head">
          <div>
            <h2 class="feed-title">특허·상표</h2>
            <p class="feed-source">KIPRIS API</p>
          </div>
          <span class="feed-icon" aria-hidden="true">✦</span>
        </div>
        <div class="feed-skeleton" aria-hidden="true">
          <div class="sk"><span class="sk-a" style="width:80%"></span><span class="sk-b" style="width:64%"></span><span class="sk-c" style="width:40%"></span></div>
          <div class="sk"><span class="sk-a" style="width:88%"></span><span class="sk-b" style="width:50%"></span><span class="sk-c" style="width:40%"></span></div>
          <div class="sk"><span class="sk-a" style="width:72%"></span><span class="sk-b" style="width:58%"></span><span class="sk-c" style="width:40%"></span></div>
        </div>
        <div class="feed-lock">
          <span class="lock-icon" aria-hidden="true">🔒</span>
          <p class="lock-title">데이터 연동 예정</p>
          <p class="lock-desc">업종 관련 상표·특허 출원 동향을 추적합니다.</p>
          <span class="lock-tag">미신청</span>
        </div>
      </section>
    </div>
  </main>
</div>
</body>
</html>
