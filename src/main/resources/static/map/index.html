<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메인 지도 대시보드 · 서울공화국</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/map/shell.css">
  <link rel="stylesheet" href="/css/map/map.css">
</head>
<body>
<div class="app">

  <!-- 앱 헤더 -->
  <header class="app-header">
    <a class="app-brand" href="/">
      <span class="app-brand-mark" aria-hidden="true">서</span>
      <span class="app-brand-text">
        <span class="app-brand-name">서울공화국</span>
        <span class="app-brand-sub">상권분석 플랫폼</span>
      </span>
    </a>

    <div class="app-search-wrap">
      <form class="app-search" role="search" action="/map/search.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B0857A" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
        <input type="search" name="q" placeholder="자치구 · 상권 · 업종 검색" aria-label="상권 검색">
      </form>
    </div>

    <div class="app-tools">
      <button type="button" class="app-quarter">2026 1분기<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.4" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
      <span class="app-status"><span class="app-status-dot" aria-hidden="true"></span><span id="app-status">연동 확인 중</span></span>
      <a class="app-user" href="/login"><span class="app-avatar" aria-hidden="true">이</span>이상혁</a>
    </div>
  </header>

  <!-- 지도 + 좌우 패널 -->
  <div class="app-body map-body">

    <!-- 지도 영역 -->
    <main class="map-stage" aria-label="상권 지도">
      <h1 class="sr-only">메인 지도 대시보드</h1>
      <div id="map" class="map-canvas"></div>

      <!-- 지도 위 요약 배지 -->
      <div class="map-summary">
        서울시 자치구 <b id="sum-gu">-</b><span class="map-summary-sep" aria-hidden="true"></span>분석 상권 <b class="hl" id="sum-trdar">-</b>
      </div>

      <!-- 지도 레이어 · 범례 -->
      <aside class="map-legend card" aria-label="지도 레이어">
        <p class="panel-label">지도 레이어</p>
        <ul class="layer-list">
          <li class="layer-item is-active" data-layer="sales"><span class="layer-dot" aria-hidden="true"></span><span class="layer-name">추정 매출</span></li>
          <li class="layer-item" data-layer="flpop"><span class="layer-dot" aria-hidden="true"></span><span class="layer-name">유동인구</span></li>
          <li class="layer-item" data-layer="store"><span class="layer-dot" aria-hidden="true"></span><span class="layer-name">점포 수</span></li>
          <li class="layer-item" data-layer="change"><span class="layer-dot" aria-hidden="true"></span><span class="layer-name">성장·쇠퇴</span></li>
        </ul>
        <hr class="map-legend-divider">
        <div class="legend-head"><span class="legend-title">추정 매출</span><span class="legend-unit">억/분기</span></div>
        <div class="legend-scale" aria-hidden="true">
          <span style="background:#f7efea"></span><span style="background:#edcbbc"></span><span style="background:#db9880"></span><span style="background:#c0664e"></span><span style="background:#a8412c"></span><span style="background:#7e2a1b"></span>
        </div>
        <div class="legend-ends"><span>낮음</span><span>높음</span></div>
      </aside>

      <!-- 출처 -->
      <p class="map-attr">지도 © Kakao · 데이터: 서울시 상권분석서비스 · 한국부동산원</p>
    </main>

    <!-- 우측 패널: 선택 상권 + 랭킹 -->
    <aside class="map-panel" aria-label="선택 상권과 자치구 랭킹">

      <!-- 선택 상권 카드 -->
      <section class="sel-card" style="display:none">
        <div class="sel-head">
          <div>
            <p class="sel-eyebrow">선택 · SELECTED</p>
            <h2 class="sel-name">-</h2>
          </div>
          <button type="button" class="sel-close" aria-label="선택 해제">✕</button>
        </div>
        <p class="sel-hero"><span class="sel-hero-num">-</span><span class="sel-hero-unit">억/분기</span><span class="sel-hero-delta"></span></p>
        <dl class="sel-metrics">
          <div class="sel-metric"><dt>추정 매출</dt><dd>-<span>억/분기</span></dd></div>
          <div class="sel-metric"><dt>유동인구</dt><dd>-<span>만 명</span></dd></div>
          <div class="sel-metric"><dt>점포 수</dt><dd>-<span>개</span></dd></div>
          <div class="sel-metric"><dt>변화지표</dt><dd>-<span></span></dd></div>
        </dl>
        <div class="sel-actions">
          <a class="sel-report" href="/map/trdar-detail.html">상세 리포트 →</a>
          <a class="sel-add" href="/map/compare.html" aria-label="비교 담기">＋</a>
        </div>
      </section>

      <!-- 랭킹 헤더 -->
      <div class="rank-head">
        <div class="rank-head-top"><h3 class="rank-title">자치구 랭킹</h3><span class="rank-top-tag">TOP 12</span></div>
        <p class="rank-sub">추정 매출 기준 · 클릭하면 지도가 이동합니다</p>
      </div>

      <!-- 랭킹 목록 -->
      <ol class="rank-list scroll"></ol>

      <!-- 랭킹 푸터 -->
      <div class="rank-foot">전체 -개 상권<a class="rank-more" href="/map/search.html">목록 →</a></div>
    </aside>
  </div>
</div>
<script src="/js/map/common.js"></script>
<script src="/js/map/index.js" defer></script>
</body>
</html>
