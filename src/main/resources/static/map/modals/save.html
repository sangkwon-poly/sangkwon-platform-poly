<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관심 상권 저장 · 여기콕</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/common/css/common.css">
  <link rel="stylesheet" href="/map/css/modals.css">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>

  <!-- 지도 배경 (실제 Kakao 연동은 이후) -->
  <div class="map-bg" id="map" aria-hidden="true">
    <div class="map-bg-top"></div>
    <div class="map-bg-grid"></div>
  </div>

  <!-- 어두운 배경 + 모달 -->
  <div class="scrim">
    <section class="modal save-modal" role="dialog" aria-modal="true" aria-labelledby="save-title">
      <header class="modal-head">
        <h2 class="modal-title" id="save-title">관심 상권 저장</h2>
        <button type="button" class="modal-close" aria-label="닫기">✕</button>
      </header>

      <div class="modal-body">
        <div class="save-target">
          <span class="save-target-mark" aria-hidden="true">역</span>
          <div>
            <div class="save-target-name">역삼동 상권</div>
            <div class="save-target-meta">강남구 · 추정매출 1,182억</div>
          </div>
        </div>

        <div class="field-label" style="color:var(--muted)">폴더</div>
        <div class="folder-row">
          <button type="button" class="folder-chip chip-on">강남 후보지</button>
          <button type="button" class="folder-chip">＋ 새 폴더</button>
        </div>

        <div class="toggle-row">
          <div>
            <div class="toggle-name">매출 변동 알림</div>
            <div class="toggle-desc">분기 갱신 시 이메일</div>
          </div>
          <button type="button" class="switch is-on" role="switch" aria-checked="true" aria-label="매출 변동 알림"></button>
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-name">신규 지원사업 알림</div>
            <div class="toggle-desc">매칭 시 푸시</div>
          </div>
          <button type="button" class="switch" role="switch" aria-checked="false" aria-label="신규 지원사업 알림"></button>
        </div>
      </div>

      <div class="modal-foot">
        <button type="button" class="btn btn-ghost">취소</button>
        <button type="button" class="btn btn-primary">저장</button>
      </div>
    </section>
  </div>

</body>
</html>
