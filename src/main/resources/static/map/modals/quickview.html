<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상권 퀵뷰 · 여기콕</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/common/css/common.css">
  <link rel="stylesheet" href="/map/css/modals.css">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>

  <!-- 지도 배경 (실제 Kakao 연동은 이후) -->
  <div class="map-bg" id="map" aria-hidden="true">
    <div class="map-bg-top"></div>
    <div class="map-bg-grid"></div>
    <span class="map-pin map-pin-1"></span>
    <span class="map-pin map-pin-2"></span>
  </div>

  <!-- 어두운 배경 + 모달 -->
  <div class="scrim">
    <section class="modal qv" role="dialog" aria-modal="true" aria-labelledby="qv-title">
      <header class="qv-head">
        <div class="qv-head-top">
          <div>
            <p class="qv-eyebrow">선택 상권</p>
            <h2 class="qv-name" id="qv-title">역삼동 상권</h2>
          </div>
          <button type="button" class="qv-close" aria-label="닫기">✕</button>
        </div>
        <p class="qv-sales">
          <span class="qv-sales-num">1,182</span>
          <span class="qv-sales-unit">억/월</span>
          <span class="qv-sales-delta">+8.2%</span>
        </p>
      </header>

      <div class="qv-grid">
        <div class="qv-cell">
          <div class="qv-cell-label">유동인구</div>
          <div class="qv-cell-value">148<small> 만</small></div>
        </div>
        <div class="qv-cell">
          <div class="qv-cell-label">점포 수</div>
          <div class="qv-cell-value">3,540</div>
        </div>
        <div class="qv-cell">
          <div class="qv-cell-label">임대료</div>
          <div class="qv-cell-value">122<small> 천원</small></div>
        </div>
        <div class="qv-cell">
          <div class="qv-cell-label">업종</div>
          <div class="qv-cell-value">음식·카페</div>
        </div>
      </div>

      <div class="qv-actions">
        <a class="btn btn-primary" href="/map/trdar-detail.html">상세 리포트 →</a>
        <button type="button" class="qv-add" aria-label="관심 상권 추가">＋</button>
      </div>
    </section>
  </div>

</body>
</html>
