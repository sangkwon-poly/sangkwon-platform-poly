<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>리포트 공유 · 여기콕</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/map/modals.css">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>

  <!-- 지도 배경 (실제 Kakao 연동은 이후) -->
  <div class="map-bg" id="map" aria-hidden="true">
    <div class="map-bg-top"></div>
    <div class="map-bg-grid"></div>
  </div>

  <!-- 어두운 배경 + 모달 -->
  <div class="scrim">
    <section class="modal share-modal" role="dialog" aria-modal="true" aria-labelledby="share-title">
      <header class="modal-head">
        <h2 class="modal-title" id="share-title">리포트 공유</h2>
        <button type="button" class="modal-close" aria-label="닫기">✕</button>
      </header>

      <div class="modal-body">
        <figure class="share-preview">
          <div class="share-preview-bar" aria-hidden="true"></div>
          <div class="share-preview-body">
            <figcaption style="flex:1">
              <div class="share-preview-title">역삼동 상권 리포트</div>
              <div class="share-preview-meta">2026 1분기 · 여기콕</div>
            </figcaption>
            <div class="share-thumb" aria-hidden="true"></div>
          </div>
        </figure>

        <div class="field-label" style="margin-bottom:8px; color:var(--muted)">공유 링크</div>
        <div class="copy-row">
          <label class="copy-input" for="share-url">
            <span class="sr-only">공유 링크</span>
            <span id="share-url">seoul.kr/r/9fK2xq</span>
          </label>
          <button type="button" class="copy-btn">복사</button>
        </div>

        <div class="share-channels">
          <button type="button" class="btn btn-kakao">카카오톡</button>
          <button type="button" class="btn btn-ghost">이미지 저장</button>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
