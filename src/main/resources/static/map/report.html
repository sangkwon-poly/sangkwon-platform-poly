<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상권 리포트 · 서울공화국</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/map/shell.css">
  <link rel="stylesheet" href="/css/map/report.css">
  <style>
    /* 인쇄 시 종이 본문만 전체 폭으로 */
    @media print {
      .app-header, .report-side, .export-side { display: none !important; }
      .app-body { display: block !important; }
      .report-preview { overflow: visible !important; padding: 0 !important; }
      .paper { width: 100% !important; max-width: 100% !important; margin: 0 !important; box-shadow: none !important; }
      body { background: #fff !important; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- 앱 헤더 -->
  <header class="app-header">
    <a class="app-brand" href="/">
      <span class="app-brand-mark" aria-hidden="true">서</span>
      <span class="app-brand-text"><span class="app-brand-name">서울공화국</span></span>
    </a>
    <span class="app-page-name">상권 리포트</span>
    <div class="app-tools">
      <a class="app-user" href="/login"><span class="app-avatar" aria-hidden="true">이</span></a>
    </div>
  </header>

  <div class="app-body">

    <!-- 포함 섹션 사이드바 -->
    <aside class="report-side scroll" aria-label="포함 섹션">
      <p class="panel-label">포함 섹션</p>
      <ul class="sec-list">
        <li class="sec-row"><span class="sec-name">표지·요약</span></li>
        <li class="sec-row"><span class="sec-name">분기 매출 추이</span></li>
        <li class="sec-row"><span class="sec-name">업종 구성</span></li>
      </ul>
    </aside>

    <!-- 리포트 미리보기 -->
    <main class="report-preview scroll" aria-label="리포트 미리보기">
      <article class="paper">
        <div class="paper-top" aria-hidden="true"></div>
        <div class="paper-body">
          <p class="paper-kicker">SEOUL TRDAR REPORT</p>
          <h1 class="paper-title">-</h1>
          <p class="paper-meta">-</p>

          <div class="paper-kpis">
            <div class="paper-kpi"><span class="paper-kpi-label">추정 매출</span><span class="paper-kpi-val">-<span> 억/분기</span></span></div>
            <div class="paper-kpi"><span class="paper-kpi-label">유동인구</span><span class="paper-kpi-val">-<span> 만 명</span></span></div>
            <div class="paper-kpi"><span class="paper-kpi-label">점포 수</span><span class="paper-kpi-val">-</span></div>
          </div>

          <h2 class="paper-h">분기 매출 추이</h2>
          <svg class="paper-trend" viewBox="0 0 680 150" preserveAspectRatio="none" aria-hidden="true"></svg>

          <h2 class="paper-h">업종 구성</h2>
          <ul class="paper-mix"></ul>

          <h2 class="paper-h">AI 분석</h2>
          <div id="ai-report" style="font-size:13.5px;line-height:1.75;color:#4a3f39;white-space:pre-line">아직 생성한 분석이 없습니다. 오른쪽 AI 분석 생성을 누르면 상권 지표를 근거로 리포트를 만듭니다.</div>
          <p id="ai-report-meta" style="font-size:11px;color:#9a8c84;margin-top:8px"></p>
        </div>
      </article>
    </main>

    <!-- 내보내기 옵션 -->
    <aside class="export-side" aria-label="내보내기 옵션">
      <p class="panel-label">내보내기</p>
      <div class="export-actions">
        <button type="button" class="export-ai" id="ai-generate"
                style="width:100%;margin-bottom:8px;padding:11px;border:0;border-radius:10px;background:#7e2a1b;color:#fff;font:inherit;font-weight:700;cursor:pointer">AI 분석 생성</button>
        <button type="button" class="export-pdf">인쇄 · PDF 저장</button>
        <button type="button" class="export-csv">분기 매출 CSV</button>
      </div>
    </aside>
  </div>
</div>
<script src="/js/map/common.js?v=20260706f"></script>
<script src="/js/map/induty-map.js?v=20260706f"></script>
<script src="/js/map/report.js?v=20260706f" defer></script>
</body>
</html>
