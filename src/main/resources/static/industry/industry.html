<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>업종·상권 동향 · 여기콕</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/map/shell.css">
    <link rel="stylesheet" href="/css/industry/industry.css">
    <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>
<div class="trend-page">
    <section class="trend-panel">

        <header class="trend-header">
            <div class="trend-title-wrap">
                <span class="brand-mark-tag" aria-hidden="true">여기</span>
                <span class="brand-name-kok">콕</span>
                <span>업종·상권 동향</span>
            </div>
            <a href="/login" class="trend-user">이</a>
        </header>

        <div class="trend-filter">
            <select id="industrySelect" class="filter-select"></select>


            <span class="update-time" id="updateTime">수집 -</span>
        </div>

        <main class="trend-grid">

            <section class="trend-card">
                <div class="card-head">
                    <h2>업계 동향</h2>
                    <span>네이버 뉴스 / Gemini 요약</span>
                </div>

                <div class="card-chip" id="insightChip">업종 선택 · 불러오는 중</div>

                <div class="insight-list">
                    <div class="insight-row">
                        <strong>업황 요약</strong>
                        <p id="summaryText">업황 요약을 불러오고 있습니다.</p>
                    </div>

                    <div class="insight-row">
                        <strong>기회 요인</strong>
                        <p id="opportunityText">기회 요인을 불러오고 있습니다.</p>
                    </div>

                    <div class="insight-row">
                        <strong>주의 요인</strong>
                        <p id="warningText">주의 요인을 불러오고 있습니다.</p>
                    </div>
                </div>


            </section>

            <section class="trend-card">
                <div class="card-head">
                    <h2>주요 프랜차이즈</h2>
                    <span>공정위 가맹사업정보</span>
                </div>

                <div class="card-chip" id="franchiseChip">업종 선택 · 불러오는 중</div>

                <ul class="franchise-list" id="franchiseList">
                    <li class="franchise-empty">가맹점 현황을 불러오고 있습니다.</li>
                </ul>
            </section>

            <section class="trend-card">
                <div class="card-head">
                    <h2>특허·상표</h2>
                    <span>KIPRIS</span>
                </div>

                <div class="card-chip" id="patentChip">업종 선택 · 불러오는 중</div>

                <ul class="patent-list" id="patentList">
                    <li class="patent-empty">상표 출원 동향을 불러오고 있습니다.</li>
                </ul>
            </section>

        </main>
    </section>
</div>
<script src="/js/map/induty-map.js"></script>
<script src="/js/industry/industry.js" defer></script>
</body>
</html>
