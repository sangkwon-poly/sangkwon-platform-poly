<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>내 찜 상권 · 여기콕</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/member.css" />
</head>
<body>
  <div class="page">
    <!-- 앱 헤더: favorites.js 에서 MemberUI.renderHeader('favorites') 로 렌더 -->
    <div id="app-header"></div>

    <main class="container">
      <div class="stack stack--loose">
        <!-- 페이지 제목 + 찜 개수 -->
        <div class="row row--between row--wrap">
          <div class="stack stack--tight">
            <h1 class="page-title">내 찜 상권</h1>
            <p class="page-subtitle">관심 상권을 모아 보고 바로 지도로 이동할 수 있어요.</p>
          </div>
          <span class="chip chip--brand" id="fav-count" hidden>찜 0곳</span>
        </div>

        <!-- 목록 영역: 로딩 / 리스트 / 빈 상태가 여기 렌더됨 -->
        <div id="fav-region" aria-live="polite">
          <!-- 초기 로딩 표시 -->
          <div class="loading-block" id="fav-loading">
            <span class="spinner spinner--lg" aria-hidden="true"></span>
            <span>찜한 상권을 불러오는 중입니다…</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/favorites.js"></script>
</body>
</html>
