<!doctype html>
<html lang="ko">
<head>
  <script src="/common/js/csrf.js?v=20260713"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>내 문의 · 여기콕</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="css/member.css">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>
  <div class="page">
    <!-- 앱 헤더: inquiries.js 에서 MemberUI.renderHeader('inquiries') 로 렌더 -->
    <div id="app-header"></div>

    <main class="container">
      <div class="stack stack--loose">
        <!-- 페이지 제목 + 새 문의 버튼 -->
        <div class="row row--between row--wrap">
          <div class="stack stack--tight">
            <h1 class="page-title">내 문의 내역</h1>
            <p class="page-subtitle">남긴 문의와 답변을 모아서 확인할 수 있어요.</p>
          </div>
          <a class="btn btn--primary btn--sm" href="/inquiry">새 문의 남기기</a>
        </div>

        <!-- 목록 영역: 로딩 / 리스트 / 빈 상태가 여기 렌더됨 -->
        <div id="iq-region" aria-live="polite">
          <div class="loading-block" id="iq-loading">
            <span class="spinner spinner--lg" aria-hidden="true"></span>
            <span>문의 내역을 불러오는 중입니다…</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/inquiries.js"></script>
</body>
</html>
