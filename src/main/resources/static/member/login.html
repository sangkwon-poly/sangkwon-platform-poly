<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 · 회원가입 · 서울공화국</title>

  <meta name="description" content="서울공화국 상권분석 플랫폼 로그인 및 회원가입. 서울시 공식 상권 데이터를 지도 위에서 확인하세요.">

  <!-- 폰트: 목업과 동일한 Pretendard -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/member/login.css">
</head>
<body class="auth-body">

  <!-- 탭 상태: 순수 CSS 라디오 토글 (JS 없음) -->
  <input type="radio" id="tab-login" name="auth-tab" class="auth-tab-state" checked hidden>
  <input type="radio" id="tab-signup" name="auth-tab" class="auth-tab-state" hidden>

  <main class="auth-card" aria-label="계정 인증">

    <!-- 왼쪽 브랜드 패널 -->
    <aside class="auth-brand" aria-label="서비스 소개">
      <div class="auth-brand-dots" aria-hidden="true"></div>

      <a class="brand auth-brand-logo" href="/">
        <span class="brand-mark auth-brand-mark" aria-hidden="true">서</span>
        <span class="brand-name">서울공화국</span>
      </a>

      <div class="auth-brand-body">
        <h1 class="auth-brand-title">데이터로 시작하는<br>창업 의사결정</h1>
        <p class="auth-brand-lead">서울시 공식 상권 데이터를 지도 위에서. 매출·유동인구·경쟁까지 5분이면 파악합니다.</p>

        <figure class="auth-quote">
          <span class="auth-quote-avatar" aria-hidden="true">김</span>
          <blockquote class="auth-quote-text">
            <b>“상권 선택 실패율이 확 줄었어요.”</b>
            <figcaption class="auth-quote-by">김도연 · 프랜차이즈 점포개발팀</figcaption>
          </blockquote>
        </figure>
      </div>
    </aside>

    <!-- 오른쪽 폼 패널 -->
    <section class="auth-panel" aria-label="계정 인증 폼">
      <div class="auth-form-wrap">

        <!-- 탭 전환 -->
        <div class="auth-tabs" role="tablist">
          <label for="tab-login" class="auth-tab" data-tab="login">로그인</label>
          <label for="tab-signup" class="auth-tab" data-tab="signup">회원가입</label>
        </div>

        <!-- 로그인 폼 -->
        <form class="auth-form auth-form-login" action="/login" method="post" aria-label="로그인">
          <div class="field">
            <label class="field-label" for="login-email">이메일</label>
            <input class="field-input" type="email" id="login-email" name="email"
                   autocomplete="email" placeholder="sanghyuk@seoul.kr" required>
          </div>

          <div class="field">
            <label class="field-label" for="login-password">비밀번호</label>
            <div class="field-password">
              <input class="field-input" type="password" id="login-password" name="password"
                     autocomplete="current-password" required>
              <!-- 비밀번호 표시 토글 (순수 CSS 체크박스) -->
              <input type="checkbox" id="login-show" class="pw-toggle-state" hidden>
              <label for="login-show" class="pw-toggle">표시</label>
            </div>
          </div>

          <div class="auth-form-row">
            <label class="remember">
              <input type="checkbox" name="remember" checked>
              <span class="remember-box" aria-hidden="true">✓</span>
              자동 로그인
            </label>
            <a class="link-brand" href="/find-password">비밀번호 찾기</a>
          </div>

          <button class="btn btn-primary auth-submit" type="submit">로그인</button>
        </form>

        <!-- 회원가입 폼 -->
        <form class="auth-form auth-form-signup" action="/signup" method="post" aria-label="회원가입">
          <div class="field">
            <label class="field-label" for="signup-email">이메일</label>
            <input class="field-input" type="email" id="signup-email" name="email"
                   autocomplete="email" placeholder="sanghyuk@seoul.kr" required>
          </div>

          <div class="field">
            <label class="field-label" for="signup-password">비밀번호</label>
            <div class="field-password">
              <input class="field-input" type="password" id="signup-password" name="password"
                     autocomplete="new-password" required>
              <input type="checkbox" id="signup-show" class="pw-toggle-state" hidden>
              <label for="signup-show" class="pw-toggle">표시</label>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="signup-password-confirm">비밀번호 확인</label>
            <input class="field-input" type="password" id="signup-password-confirm" name="passwordConfirm"
                   autocomplete="new-password" required>
          </div>

          <div class="auth-form-row auth-form-row-terms">
            <label class="remember">
              <input type="checkbox" name="agree" required>
              <span class="remember-box" aria-hidden="true">✓</span>
              <a class="link-brand" href="/terms">이용약관</a> 및 <a class="link-brand" href="/privacy">개인정보처리방침</a>에 동의합니다
            </label>
          </div>

          <button class="btn btn-primary auth-submit" type="submit">회원가입</button>
        </form>

        <!-- 소셜 로그인 -->
        <div class="auth-divider"><span>또는</span></div>

        <div class="auth-social">
          <button class="social-btn social-kakao" type="button">카카오</button>
          <button class="social-btn social-google" type="button">Google</button>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
