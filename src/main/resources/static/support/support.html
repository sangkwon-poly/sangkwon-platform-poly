<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>지원사업 · 여기콕</title>
  <meta name="description" content="기업마당과 K-Startup 창업 지원사업을 유형·지역·조건으로 한 번에 조회하세요.">

  <meta name="theme-color" content="#a8412c">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/support/support.css">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>

<a class="skip-link" href="#main">본문 바로가기</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/" aria-label="여기콕 홈">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="brand-name-kok">콕</span>
      </a>

      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="주요 메뉴 열기/닫기">
      <label for="nav-toggle" class="nav-toggle-btn" aria-hidden="true">
        <span></span><span></span><span></span>
      </label>

      <nav class="site-nav" aria-label="주요 메뉴">
        <ul class="nav-menu">
          <li><a href="/map">상권분석</a></li>
          <li><a href="/support" aria-current="page">지원사업</a></li>
        </ul>
        <div class="nav-actions">
          <a class="link-login" href="/login">로그인</a>
        </div>
      </nav>
    </div>
  </header>

  <main id="main" class="support-main" aria-label="지원사업 통합 조회">
    <div class="container support-inner">

      <section class="sp-head">
        <div class="sp-head-left">
          <h1 class="sp-count">지원사업 <span class="sp-count-num" id="sp-count">0</span>건</h1>
          <p class="sp-sub" id="sp-sub">기업마당, K-Startup 공고 통합. 기본 정렬은 마감임박순.</p>
          <ul class="sp-active-chips" id="sp-active-chips" aria-label="적용된 상세필터"></ul>
        </div>
        <div class="sp-recruit" role="group" aria-label="모집 상태">
          <button type="button" class="sp-recruit-btn is-active" data-recruiting="true">모집중</button>
          <button type="button" class="sp-recruit-btn" data-recruiting="false">마감 포함</button>
        </div>
      </section>

      <nav class="sp-type-tabs" id="sp-type-tabs" aria-label="지원 유형 필터"></nav>

      <div class="sp-filters">
        <div class="sp-filter" role="group" aria-label="지역">
          <span class="sp-filter-label">지역</span>
          <button type="button" class="sp-chip is-active" data-key="region" data-value="">전체</button>
          <button type="button" class="sp-chip" data-key="region" data-value="seoul">서울</button>
          <button type="button" class="sp-chip" data-key="region" data-value="nation">전국</button>
        </div>
        <div class="sp-filter" role="group" aria-label="출처">
          <span class="sp-filter-label">출처</span>
          <button type="button" class="sp-chip is-active" data-key="source" data-value="">전체</button>
          <button type="button" class="sp-chip" data-key="source" data-value="BIZINFO">기업마당</button>
          <button type="button" class="sp-chip" data-key="source" data-value="KSTARTUP">K-Startup</button>
        </div>
        <div class="sp-filter" role="group" aria-label="대상">
          <span class="sp-filter-label">대상</span>
          <button type="button" class="sp-chip is-active" data-key="target" data-value="">전체</button>
          <button type="button" class="sp-chip" data-key="target" data-value="소상공인">소상공인</button>
          <button type="button" class="sp-chip" data-key="target" data-value="예비창업">예비창업자</button>
          <button type="button" class="sp-chip" data-key="target" data-value="청년">청년</button>
          <button type="button" class="sp-chip" data-key="target" data-value="중소기업">중소기업</button>
        </div>
        <form class="sp-search" id="sp-search" role="search">
          <input type="search" id="sp-q" name="q" placeholder="공고명 검색" aria-label="공고명 검색">
        </form>
      </div>

      <details class="sp-detail" id="sp-detail">
        <summary class="sp-detail-summary">
          상세 필터 · 창업기간 / 연령
          <span class="sp-detail-note">K-Startup 공고에만 제공</span>
        </summary>
        <div class="sp-detail-body">
          <div class="sp-detail-row" role="group" aria-label="창업기간">
            <span class="sp-filter-label">창업기간</span>
            <button type="button" class="sp-chip" data-key="founding" data-value="PRELIMINARY">예비창업자</button>
            <button type="button" class="sp-chip" data-key="founding" data-value="Y1">1년 미만</button>
            <button type="button" class="sp-chip" data-key="founding" data-value="Y3">3년 미만</button>
            <button type="button" class="sp-chip" data-key="founding" data-value="Y5">5년 미만</button>
            <button type="button" class="sp-chip" data-key="founding" data-value="Y7">7년 미만</button>
            <button type="button" class="sp-chip" data-key="founding" data-value="Y10">10년 미만</button>
          </div>
          <div class="sp-detail-row" role="group" aria-label="연령">
            <span class="sp-filter-label">연령</span>
            <button type="button" class="sp-chip" data-key="age" data-value="UNDER20">만 20세 미만</button>
            <button type="button" class="sp-chip" data-key="age" data-value="A20_39">만 20~39세</button>
            <button type="button" class="sp-chip" data-key="age" data-value="OVER40">만 40세 이상</button>
          </div>
        </div>
      </details>

      <div class="sp-banner" id="sp-banner" hidden>
        <span class="sp-banner-text" id="sp-banner-text"></span>
        <label class="sp-banner-check">
          <input type="checkbox" id="sp-include-unknown"> 정보 없는 공고도 포함
        </label>
        <button type="button" class="sp-banner-clear" id="sp-clear-detail">상세필터 해제</button>
      </div>

      <ul class="sp-list" id="sp-list" aria-label="지원사업 목록"></ul>

      <div class="sp-empty" id="sp-empty" hidden>
        <p class="sp-empty-title">조건에 맞는 지원사업이 없습니다.</p>
        <p class="sp-empty-sub">필터를 줄이거나 초기화해 보세요.</p>
        <button type="button" class="btn btn-primary" id="sp-reset">필터 초기화</button>
      </div>

      <div class="sp-more-wrap" id="sp-more-wrap" hidden>
        <button type="button" class="sp-more" id="sp-more">더 보기</button>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="brand-name-kok">콕</span>
      </div>
      <nav class="footer-nav" aria-label="푸터 메뉴">
        <a href="/about">회사소개</a>
        <a href="/terms">이용약관</a>
        <a href="/privacy">개인정보처리방침</a>
      </nav>
      <p class="footer-copy">© 2026 여기콕. 서울시 공식 상권 데이터 기반.</p>
    </div>
  </footer>

  <script>
    // 로그인 세션을 헤더 액션 영역에 반영
    (function () {
      var actions = document.querySelector('.nav-actions');
      if (!actions) return;
      function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
      fetch('/api/members/me', { credentials: 'include', headers: { Accept: 'application/json' } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (b) {
          var me = b && b.data;
          if (!me) return;
          actions.innerHTML =
            '<a class="link-login" href="/member/mypage">' + esc(me.nickname || me.loginId) + '님</a>' +
            '<button type="button" class="btn btn-primary btn-sm" id="nav-logout">로그아웃</button>';
          var btn = document.getElementById('nav-logout');
          if (btn) btn.addEventListener('click', function () {
            fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
              .then(function () { location.reload(); }, function () { location.reload(); });
          });
        })
        .catch(function () {});
    })();
  </script>
  <script src="/support/support.js"></script>
</body>
</html>
