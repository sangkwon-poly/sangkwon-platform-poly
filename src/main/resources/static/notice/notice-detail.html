<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>공지사항 · 여기콕</title>
  <meta name="description" content="여기콕 공지사항 상세.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/notice/notice.css">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="brand-name-kok">콕</span>
      </a>

      <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
      <label for="nav-toggle" class="nav-toggle-btn" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </label>

      <nav class="site-nav" aria-label="주요 메뉴">
        <ul class="nav-menu">
          <li><a href="/#features">기능</a></li>
          <li><a href="/support">지원사업</a></li>
          <li><a href="/industry/industry.html">업계동향</a></li>
          <li><a href="/notice" aria-current="page">공지사항</a></li>
          <li><a href="/inquiry">문의하기</a></li>
        </ul>
        <div class="nav-actions">
          <a class="link-login" href="/login">로그인</a>
          <a class="link-login" href="/signup">회원가입</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="notice-main" aria-label="공지사항 상세">
    <div class="container ntd-wrap">
      <a class="ntd-back" href="/notice">목록으로</a>
      <article class="ntd-card" id="ntd-root">
        <p class="ntd-loading">불러오는 중…</p>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand-mark-tag" aria-hidden="true">여기</span>
        <span class="brand-name-kok">콕</span>
      </div>
      <nav class="footer-nav" aria-label="푸터 메뉴">
        <a href="/about">회사소개</a>
        <a href="/terms">이용약관</a>
        <a href="/privacy">개인정보처리방침</a>
      </nav>
      <p class="footer-copy">© 2026 여기콕. 서울시 공식 상권 데이터 기반.</p>
    </div>
  </footer>

  <script>
    // 로그인 세션을 헤더 액션 영역에 반영
    (function () {
      var actions = document.querySelector('.nav-actions');
      if (!actions) return;
      function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
      fetch('/api/members/me', { credentials: 'include', headers: { Accept: 'application/json' } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (b) {
          var me = b && b.data;
          if (!me) return;
          var initial = esc((me.nickname || me.loginId || '?').slice(0, 1));
          actions.innerHTML =
            '<a class="nav-user" href="/member/mypage" title="마이페이지">' +
              '<span class="nav-avatar" aria-hidden="true">' + initial + '</span>' +
              '<span class="nav-user-name">' + esc(me.nickname || me.loginId) + '님</span>' +
            '</a>' +
            '<button type="button" class="btn btn-primary btn-sm" id="nav-logout">로그아웃</button>';
          var btn = document.getElementById('nav-logout');
          if (btn) btn.addEventListener('click', function () {
            fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
              .then(function () { location.reload(); }, function () { location.reload(); });
          });
        })
        .catch(function () {});
    })();
  </script>
  <script src="/notice/notice-detail.js"></script>
</body>
</html>
