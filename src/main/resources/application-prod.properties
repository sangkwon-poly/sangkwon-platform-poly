# 운영(prod) 프로파일. 실행: --spring.profiles.active=prod
# 시크릿(DB 접속, 외부 API 키, 토스/제미나이 키 등)은 파일이 아니라 환경변수로 주입한다.
# base application.properties의 ${...} 참조를 그대로 쓰고, 여기서는 운영 전용 하드닝만 덮어쓴다.

# HTTPS 뒤에서만 세션 쿠키를 전송한다(평문 노출 방지). 로컬 기본값(false)을 강제로 켠다.
server.servlet.session.cookie.secure=true

# 리버스 프록시/로드밸런서 뒤에서 실제 클라이언트 IP를 복원한다(X-Forwarded-For 신뢰).
# 이게 없으면 getRemoteAddr()가 프록시 IP 하나로 수렴해, IP 레이트리밋이 전역 카운터가 되어
# 소수의 실패로 전 관리자가 429로 잠기는 오구성 DoS가 생긴다. 신뢰 프록시 뒤에서만 켠다.
server.forward-headers-strategy=framework

# 운영에서는 SQL 로그를 남기지 않는다(로그 소음/민감정보 방지)
spring.jpa.show-sql=false

# 관리자 API 허용 IP는 운영 환경변수로 반드시 지정하는 것을 권장한다(비우면 제한 없음)
# admin.security.ip-allowlist=... (환경변수 ADMIN_IP_ALLOWLIST)
