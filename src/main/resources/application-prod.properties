# 운영(prod) 프로파일. 실행: --spring.profiles.active=prod
# 시크릿(DB 접속, 외부 API 키, 토스/제미나이 키 등)은 파일이 아니라 환경변수로 주입한다.
# base application.properties의 ${...} 참조를 그대로 쓰고, 여기서는 운영 전용 하드닝만 덮어쓴다.

# HTTPS 뒤에서만 세션 쿠키를 전송한다(평문 노출 방지). 로컬 기본값(false)을 강제로 켠다.
server.servlet.session.cookie.secure=true

# 리버스 프록시/로드밸런서(HTTPS 종단) 뒤 배포 전제.
# forward-headers-strategy=framework는 X-Forwarded-Proto를 반영해 request.isSecure()가 https가 되게 한다
# (신뢰 기기 쿠키의 Secure 플래그 판정에 필요). 단, 이 전략은 getRemoteAddr()를 X-Forwarded-For의
# '가장 왼쪽'(클라이언트가 조작 가능) 값으로도 바꾸므로, 보안 판정(IP 허용목록·레이트리밋)은 절대
# getRemoteAddr()를 쓰지 않는다.
server.forward-headers-strategy=framework

# 접속 IP 판정은 trust-forwarded-for=true로 ClientIpResolver/AdminIpInterceptor가 신뢰 프록시가
# '가장 오른쪽'에 덧붙인 실제 접속 IP만 쓴다(관리자 허용목록·레이트리밋, 회원 로그인 레이트리밋 공통).
# 이러면 조작 가능한 왼쪽 XFF/getRemoteAddr로는 우회가 안 된다.
# 전제(중요): 엣지 프록시가 정확히 1홉이고, 클라이언트가 보낸 X-Forwarded-For를 신뢰하지 말고 실제 접속
# IP를 오른쪽 끝에 덧붙여야 한다(nginx: proxy_set_header X-Forwarded-For $remote_addr, 또는 인바운드
# XFF strip). 프록시가 2홉 이상이면 '오른쪽 끝' 가정이 깨지므로 토폴로지에 맞게 재검토한다.
admin.security.trust-forwarded-for=true

# 운영에서는 SQL 로그를 남기지 않는다(로그 소음/민감정보 방지)
spring.jpa.show-sql=false

# 관리자 API 허용 IP는 운영 환경변수로 반드시 지정하는 것을 권장한다(비우면 제한 없음)
# admin.security.ip-allowlist=... (환경변수 ADMIN_IP_ALLOWLIST)
