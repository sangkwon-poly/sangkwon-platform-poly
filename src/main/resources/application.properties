spring.application.name=sangkwon-platform

# Oracle Cloud Autonomous Database (지갑 방식 연결)
# 실제 값은 application-local.properties(gitignore 처리됨)에 두고,
# 실행 시 spring.profiles.active=local 로 켜서 사용하세요.
# 팀원마다 지갑 파일 위치가 다르면 DB_WALLET_DIR 값만 각자 로컬 파일에서 바꾸면 됩니다.
spring.datasource.url=jdbc:oracle:thin:@${DB_TNS_ALIAS}?TNS_ADMIN=${DB_WALLET_DIR}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 커넥션 풀: 고정 크기(min=max)면 요청마다 커넥션을 새로 만드는 지연이 없어 성능에 유리하다.
# 동시 사용자가 한 자릿수라 5로 충분하고, 이 이상 키워도 더 빨라지지 않는다(공유 계정 세션도 아낌).
# max-lifetime/keepalive는 ADB가 유휴 세션을 끊어 생기는 죽은 커넥션을 미리 걸러낸다.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.pool-name=sangkwon-pool

# 운영 관측성: 헬스체크만 노출한다(env/beans 등 민감 엔드포인트는 닫음). LB/업타임 프로브용.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.access.default=none
management.endpoint.health.access=read-only

# 스키마는 db/schema.sql이 관리하므로 Hibernate는 DDL을 건드리지 않는다
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
# SQL 로그는 개발용이므로 base가 아니라 application-local.properties에서만 켠다 (운영/공유 실행 시 로그 소음 방지)

# 무중단 종료: 진행 중 요청을 마치고 내린다(배포 시 요청 중단/502 방지)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# 세션 유휴 만료를 명시한다(회원 자동로그인 선택 시 코드에서 14일로 연장, 그 외/관리자는 30분)
server.servlet.session.timeout=30m

# 세션 영속화(Spring Session JDBC)는 SessionConfig의 @EnableJdbcHttpSession으로 켠다.
# 세션 테이블(SPRING_SESSION)은 db/schema.sql이 관리하므로 자동 생성은 하지 않는다.

# 세션 쿠키 하드닝: 크로스사이트 전송 제한(SameSite)과 스크립트 접근 차단(HttpOnly).
# HTTPS 배포에서는 SESSION_COOKIE_SECURE=true 로 켜세요(prod 프로파일은 기본 강제).
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# 외부 API 키 (실제 값은 application-local.properties, 팀원은 .example 참고)
kakao.map.js-key=${KAKAO_JS_KEY}
kakao.map.rest-key=${KAKAO_REST_KEY}
datagokr.service-key=${DATAGOKR_SERVICE_KEY}
seoul.opendata.key=${SEOUL_OPENDATA_KEY}
ftc.franchise.service-key=${FTC_FRANCHISE_KEY}
reb.rone.key=${REB_RONE_KEY}
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}
# 창업지원사업 적재(기업마당/K-Startup). 키 없으면 앱 적재 트리거만 막히고 조회는 정상
bizinfo.service-key=${BIZINFO_SERVICE_KEY:}
kstartup.service-key=${KSTARTUP_SERVICE_KEY:}
# KIPRIS 상표 검색(업종 동향 화면). 키 없으면 적재 트리거만 막히고 조회는 정상
kipris.service-key=${KIPRIS_API_KEY:}

# 토스페이먼츠 요금제 결제 (키가 없으면 결제 요청 시 안내만 반환. 로컬은 공식 문서 테스트 키 사용)
toss.client-key=${TOSS_CLIENT_KEY:}
toss.secret-key=${TOSS_SECRET_KEY:}

# Gemini AI 리포트 (키가 없으면 생성 요청 시 안내만 반환)
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

#gemini 뉴스 정리용 (키가 없으면 배치 미동작. 키 없이도 컨텍스트는 뜨도록 기본값 빈값)
gemini.api-news-key=${GEMINI_API_NEWS_KEY:}

# 관리자 API 허용 IP (비우면 제한 없음). 예: 127.0.0.1,::1,10.0.0.0/8
admin.security.ip-allowlist=${ADMIN_IP_ALLOWLIST:}
# 신뢰 프록시 뒤에서만 X-Forwarded-For를 IP 판정에 사용 (직접 노출이면 false)
admin.security.trust-forwarded-for=${ADMIN_TRUST_XFF:false}
# "이 기기 신뢰" 쿠키 서명 키(비우면 부팅마다 임의 키)와 신뢰 유지 일수
admin.security.trust-device-secret=${ADMIN_TRUST_DEVICE_SECRET:}
admin.security.trust-device-days=${ADMIN_TRUST_DEVICE_DAYS:30}

# 회원 휴면(DORMANT) 자동 전환 임계일. 마지막 접속(없으면 가입) 후 이 일수를 넘기면 휴면 처리한다.
member.dormant.inactive-days=${MEMBER_DORMANT_INACTIVE_DAYS:365}

# 배치 실패 알림 웹훅(Slack 호환 incoming webhook 등). 비우면 알림 비활성.
ops.alert.webhook-url=${OPS_ALERT_WEBHOOK_URL:}
# 장기 실행 배치 생존 확인. 복구 임계는 하트비트 주기의 3배로 잡아 일시 지연을 허용한다.
batch.running-heartbeat.interval-seconds=${BATCH_HEARTBEAT_INTERVAL_SECONDS:300}
batch.startup-recovery.stale-after-minutes=${BATCH_RECOVERY_STALE_MINUTES:15}

