# 여기콕 리버스 프록시 + 로드밸런서 + TLS 종단
# 앱 2 인스턴스로 부하 분산하고, 한 쪽이 죽으면 자동으로 다른 쪽으로 넘긴다(FT).
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # 앱 2 인스턴스. 실패 3회면 15초간 제외했다가 복구를 재시도한다.
    upstream sangkwon_app {
        least_conn;
        server app1:8080 max_fails=3 fail_timeout=15s;
        server app2:8080 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # HTTP는 HTTPS로 영구 이전
    server {
        listen 80;
        server_name www.sang.it.kr sang.it.kr;
        location / { return 301 https://www.sang.it.kr$request_uri; }
    }

    # 정식 서비스(HTTPS)
    server {
        listen 443 ssl;
        http2 on;
        server_name www.sang.it.kr;

        ssl_certificate     /etc/letsencrypt/live/www.sang.it.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.sang.it.kr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        client_max_body_size 10m;

        location / {
            proxy_pass http://sangkwon_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            # 실 클라이언트 IP를 오른쪽 끝에 append한다(앱은 prod에서 오른쪽 값만 신뢰: trust-forwarded-for).
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            # 한 인스턴스가 죽거나 5xx면 다른 인스턴스로 재시도해 무중단 유지
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_read_timeout 65s;
        }
    }
}
